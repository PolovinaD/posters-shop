image:
  # Override with: --set image.repository=$ECR_REGISTRY/catalog
  repository: YOUR_ECR_REGISTRY/catalog
  tag: "latest"
replicaCount: 1

service:
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  - name: SERVICE_NAME
    value: "catalog"
  - name: LOG_LEVEL
    value: "INFO"
  - name: ROOT_PATH
    value: "/api/catalog"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: postershop-db
        key: DATABASE_URL_CATALOG
  - name: INVENTORY_SERVICE_URL
    value: "http://inventory"

ingress:
  enabled: false

migrations:
  enabled: true
  secretName: postershop-db
  secretKey: DATABASE_URL_CATALOG

