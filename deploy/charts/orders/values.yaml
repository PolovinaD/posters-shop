image:
  # Override with: --set image.repository=$ECR_REGISTRY/orders
  repository: YOUR_ECR_REGISTRY/orders
  tag: "latest"
replicaCount: 1

service:
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 512Mi

env:
  - name: SERVICE_NAME
    value: "orders"
  - name: LOG_LEVEL
    value: "INFO"
  - name: ROOT_PATH
    value: "/api/orders"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: postershop-db
        key: DATABASE_URL_ORDERS
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: postershop-jwt
        key: JWT_SECRET
  - name: INVENTORY_SERVICE_URL
    value: "http://inventory"
  - name: PRODUCTION_SERVICE_URL
    value: "http://production"
  - name: PAYMENT_SERVICE_URL
    value: "http://payments"
  - name: STRIPE_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: postershop-stripe
        key: SECRET_KEY
  - name: STRIPE_WEBHOOK_SECRET
    valueFrom:
      secretKeyRef:
        name: postershop-stripe
        key: WEBHOOK_SECRET
  - name: CORS_ORIGINS
    value: "http://localhost:3000"
  - name: CB_FAILURE_THRESHOLD
    value: "5"
  - name: CB_RECOVERY_TIMEOUT
    value: "30"

ingress:
  enabled: false

# Database migrations
migrations:
  enabled: true
  secretName: postershop-db
  secretKey: DATABASE_URL_ORDERS
