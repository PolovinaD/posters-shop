image:
  # Override with: --set image.repository=$ECR_REGISTRY/logistics
  repository: YOUR_ECR_REGISTRY/logistics
  tag: "latest"
replicaCount: 1

service:
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  - name: SERVICE_NAME
    value: "logistics"
  - name: LOG_LEVEL
    value: "INFO"
  - name: ROOT_PATH
    value: "/api/logistics"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: postershop-db
        key: DATABASE_URL_LOGISTICS
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: postershop-jwt
        key: JWT_SECRET
  - name: ORDERS_SERVICE_URL
    value: "http://orders"

ingress:
  enabled: false

migrations:
  enabled: true
  secretName: postershop-db
  secretKey: DATABASE_URL_LOGISTICS

