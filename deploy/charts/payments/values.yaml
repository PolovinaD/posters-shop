image:
  # Override with: --set image.repository=$ECR_REGISTRY/payments
  repository: YOUR_ECR_REGISTRY/payments
  tag: "latest"
replicaCount: 1

service:
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  - name: SERVICE_NAME
    value: "payments"
  - name: LOG_LEVEL
    value: "INFO"
  - name: ROOT_PATH
    value: "/api/payments"
  - name: STRIPE_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: postershop-stripe
        key: SECRET_KEY
  - name: STRIPE_WEBHOOK_SECRET
    valueFrom:
      secretKeyRef:
        name: postershop-stripe
        key: WEBHOOK_SECRET
  - name: ORDERS_WEBHOOK_URL
    value: "http://orders/webhooks/stripe"
  - name: FRONTEND_URL
    value: "http://k8s-postersh-frontend-485473415f-1919299998.eu-north-1.elb.amazonaws.com"
  - name: CORS_ORIGINS
    value: "http://localhost:3000"

ingress:
  enabled: false

