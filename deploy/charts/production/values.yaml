image:
  # Override with: --set image.repository=$ECR_REGISTRY/production
  repository: YOUR_ECR_REGISTRY/production
  tag: "latest"
replicaCount: 1

service:
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 300m
    memory: 384Mi

env:
  - name: SERVICE_NAME
    value: "production"
  - name: LOG_LEVEL
    value: "INFO"
  - name: ROOT_PATH
    value: "/api/production"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: postershop-db
        key: DATABASE_URL_PRODUCTION
  - name: ORDERS_SERVICE_URL
    value: "http://orders"
  - name: LOGISTICS_SERVICE_URL
    value: "http://logistics"
  - name: CORS_ORIGINS
    value: "http://localhost:3000"

ingress:
  enabled: false

# HPA config
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

migrations:
  enabled: true
  secretName: postershop-db
  secretKey: DATABASE_URL_PRODUCTION

