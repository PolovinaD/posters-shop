{{- if .Values.serviceAccount.create }}
{{- if not .Values.serviceAccount.name }}
{{- fail "serviceAccount.create is true but serviceAccount.name is empty. Set serviceAccount.name to the ServiceAccount this chart should create." }}
{{- end }}
# Created only when serviceAccount.create is true. The documented production path uses
# `eksctl create iamserviceaccount` instead, which creates and annotates the
# ServiceAccount outside Helm; in that case leave create false and set only
# serviceAccount.name so the Deployment consumes the existing account.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    app: notifications
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
