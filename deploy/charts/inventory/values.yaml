image:
  # Override with: --set image.repository=$ECR_REGISTRY/inventory
  repository: YOUR_ECR_REGISTRY/inventory
  tag: "latest"
replicaCount: 1

service:
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 300m
    memory: 384Mi

env:
  - name: SERVICE_NAME
    value: "inventory"
  - name: LOG_LEVEL
    value: "INFO"
  - name: ROOT_PATH
    value: "/api/inventory"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: postershop-db
        key: DATABASE_URL_INVENTORY
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: postershop-jwt
        key: JWT_SECRET
  - name: CORS_ORIGINS
    value: "http://localhost:3000"

ingress:
  enabled: false

migrations:
  enabled: true
  secretName: postershop-db
  secretKey: DATABASE_URL_INVENTORY
