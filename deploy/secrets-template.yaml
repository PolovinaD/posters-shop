# ============================================================
# Kubernetes Secrets Template for PosterShop Platform
# ============================================================
# IMPORTANT: Do NOT commit actual secrets to version control!
# Use this template to create secrets manually or via CI/CD.
#
# Usage:
#   1. Copy this file: cp secrets-template.yaml secrets.yaml
#   2. Fill in actual values (base64 encoded)
#   3. Apply: kubectl apply -f secrets.yaml -n postershop
#   4. Delete the file: rm secrets.yaml
#
# To base64 encode a value:
#   echo -n 'your-value' | base64
# ============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: postershop

---
# Database connection strings for each service
# Each service has its own schema-specific user
apiVersion: v1
kind: Secret
metadata:
  name: postershop-db
  namespace: postershop
type: Opaque
data:
  # Format: postgresql://{user}:{password}@{host}:{port}/{database}?options=-csearch_path%3D{schema}
  # Replace {RDS_ENDPOINT} with your actual RDS endpoint
  DATABASE_URL_USERS: <base64-encoded>      # postgresql://users_svc:xxx@rds-endpoint:5432/postershop?options=-csearch_path%3Dusers
  DATABASE_URL_CATALOG: <base64-encoded>    # postgresql://catalog_svc:xxx@rds-endpoint:5432/postershop?options=-csearch_path%3Dcatalog
  DATABASE_URL_ORDERS: <base64-encoded>     # postgresql://orders_svc:xxx@rds-endpoint:5432/postershop?options=-csearch_path%3Dorders
  DATABASE_URL_PRODUCTION: <base64-encoded> # postgresql://production_svc:xxx@rds-endpoint:5432/postershop?options=-csearch_path%3Dproduction
  DATABASE_URL_LOGISTICS: <base64-encoded>  # postgresql://logistics_svc:xxx@rds-endpoint:5432/postershop?options=-csearch_path%3Dlogistics
  DATABASE_URL_INVENTORY: <base64-encoded>  # postgresql://inventory_svc:xxx@rds-endpoint:5432/postershop?options=-csearch_path%3Dinventory

---
# JWT authentication secret (shared between services that do auth)
apiVersion: v1
kind: Secret
metadata:
  name: postershop-jwt
  namespace: postershop
type: Opaque
data:
  JWT_SECRET: <base64-encoded>  # Generate with: openssl rand -hex 32

---
# Stripe/Payment secrets
apiVersion: v1
kind: Secret
metadata:
  name: postershop-stripe
  namespace: postershop
type: Opaque
data:
  WEBHOOK_SECRET: <base64-encoded>  # Your Stripe webhook signing secret
  # For production Stripe integration, add:
  # API_KEY: <base64-encoded>       # sk_live_xxx or sk_test_xxx

