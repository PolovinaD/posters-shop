# ============================================================
# EKS Cluster Configuration for PosterShop
# ============================================================
# Creates a minimal but production-ready EKS cluster.
#
# Usage:
#   eksctl create cluster -f eksctl-cluster.yaml
#
# To delete:
#   eksctl delete cluster -f eksctl-cluster.yaml
# ============================================================

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: postershop
  region: eu-north-1
  version: "1.29"
  tags:
    project: postershop
    environment: production

# ============================================================
# EKS access entries — who may talk to the cluster API
# ============================================================
# An access entry lives on the CLUSTER, so it dies with a teardown.
# Declaring it here re-grants CI access automatically on every
# `eksctl create cluster`, instead of a manual step after each recreate.
#
# authenticationMode: API_AND_CONFIG_MAP enables the access-entry API
# while leaving the legacy aws-auth ConfigMap path working, so nothing
# that still depends on aws-auth loses access silently. Bare `API`
# would disable that path outright.
#
# Scope is cluster-admin, deliberately. The deploy workflow runs
# `kubectl get nodes` in its cluster probe (a cluster-scoped read) and
# `kubectl create namespace` on first deploy (a cluster-scoped write).
# A namespace-scoped AmazonEKSEditPolicy grants neither: the probe would
# 403, classify as `kubectl-rbac-denied`, and end the run RED before any
# deploy was attempted. Acceptable here — a single-tenant thesis cluster
# whose CI role is already pinned by trust policy to one repo and the
# master branch.
#
# NOTE: principalARN takes a literal ARN — eksctl config files have no
# variable substitution — so the AWS account ID is committed here.
accessConfig:
  authenticationMode: API_AND_CONFIG_MAP
  accessEntries:
    - principalARN: arn:aws:iam::553967852170:role/github-eks-deploy
      accessPolicies:
        - policyARN: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          accessScope:
            type: cluster

# IAM OIDC provider for service accounts (required for ALB controller, etc.)
iam:
  withOIDC: true
  serviceAccounts:
    # AWS Load Balancer Controller
    - metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      wellKnownPolicies:
        awsLoadBalancerController: true
    # External DNS (optional)
    - metadata:
        name: external-dns
        namespace: kube-system
      wellKnownPolicies:
        externalDNS: true

# VPC configuration - create new VPC
vpc:
  cidr: 10.0.0.0/16
  nat:
    gateway: Single  # Use HighlyAvailable for production
  clusterEndpoints:
    publicAccess: true
    privateAccess: true

# Node groups
# Pod capacity per instance type:
#   t3.small: ~11 pods, t3.medium: ~17 pods, t3.large: ~35 pods
managedNodeGroups:
  # Main worker nodes
  - name: workers
    instanceType: t3.large
    desiredCapacity: 2
    minSize: 1
    maxSize: 5
    volumeSize: 30
    volumeType: gp3
    privateNetworking: true
    labels:
      role: worker
    tags:
      project: postershop
    iam:
      withAddonPolicies:
        imageBuilder: true
        autoScaler: true
        ebs: true
        cloudWatch: true

# Addons
addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest
    wellKnownPolicies:
      ebsCSIController: true

# CloudWatch logging
cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator

