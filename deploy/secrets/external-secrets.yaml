# ExternalSecrets - sync secrets from AWS Secrets Manager to Kubernetes
---
# Database credentials for all services
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postershop-db
  namespace: postershop
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: postershop-db
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL_USERS
      remoteRef:
        key: postershop/database
        property: USERS_DATABASE_URL
    - secretKey: DATABASE_URL_CATALOG
      remoteRef:
        key: postershop/database
        property: CATALOG_DATABASE_URL
    - secretKey: DATABASE_URL_ORDERS
      remoteRef:
        key: postershop/database
        property: ORDERS_DATABASE_URL
    - secretKey: DATABASE_URL_PRODUCTION
      remoteRef:
        key: postershop/database
        property: PRODUCTION_DATABASE_URL
    - secretKey: DATABASE_URL_LOGISTICS
      remoteRef:
        key: postershop/database
        property: LOGISTICS_DATABASE_URL
    - secretKey: DATABASE_URL_INVENTORY
      remoteRef:
        key: postershop/database
        property: INVENTORY_DATABASE_URL
---
# JWT secret for authentication
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postershop-jwt
  namespace: postershop
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: postershop-jwt
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: postershop/jwt
        property: JWT_SECRET
---
# Stripe webhook secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postershop-stripe
  namespace: postershop
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: postershop-stripe
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: postershop/stripe
        property: SECRET_KEY
    - secretKey: WEBHOOK_SECRET
      remoteRef:
        key: postershop/stripe
        property: WEBHOOK_SECRET
