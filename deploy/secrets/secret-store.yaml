# SecretStore - connects External Secrets Operator to AWS Secrets Manager
# Uses IRSA (IAM Roles for Service Accounts) for authentication
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: postershop
spec:
  provider:
    aws:
      service: SecretsManager
      region: ${AWS_REGION}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
