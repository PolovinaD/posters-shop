# ============================================================
# PrometheusRule - Alert Rules for PosterShop
# ============================================================
# Apply with: kubectl apply -f alertrules.yaml -n postershop
# ============================================================

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: postershop-alerts
  namespace: postershop
  labels:
    release: prometheus
    app: postershop
spec:
  groups:
    # ============== Service Health Alerts ==============
    - name: service-health
      rules:
        - alert: ServiceDown
          expr: up{job=~".*postershop.*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.job }} is down"
            description: "Service {{ $labels.job }} has been down for more than 2 minutes."

        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
            > 0.05
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High error rate on {{ $labels.service }}"
            description: "Service {{ $labels.service }} has error rate > 5% for 2 minutes. Current: {{ $value | humanizePercentage }}"

        - alert: CriticalErrorRate
          expr: |
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
            > 0.20
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Critical error rate on {{ $labels.service }}"
            description: "Service {{ $labels.service }} has error rate > 20%. Current: {{ $value | humanizePercentage }}"

        - alert: SlowRequests
          expr: |
            histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))
            > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Slow requests on {{ $labels.service }}"
            description: "P95 latency on {{ $labels.service }} is > 2s. Current: {{ $value | humanizeDuration }}"

    # ============== Orders Alerts ==============
    - name: orders
      rules:
        - alert: OrderCreationSpike
          expr: |
            rate(orders_created_total[5m]) > 10
          for: 5m
          labels:
            severity: info
          annotations:
            summary: "High order creation rate"
            description: "Orders are being created at {{ $value | humanize }} per second."

        - alert: HighReservationFailures
          expr: |
            rate(inventory_reservation_failures_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High inventory reservation failure rate"
            description: "Reservation failures: {{ $value | humanize }} per second."

        - alert: PendingOrdersBacklog
          expr: |
            orders_by_status{status="created"} > 50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Large backlog of pending orders"
            description: "{{ $value }} orders stuck in 'created' status for >10 minutes."

    # ============== Inventory Alerts ==============
    - name: inventory
      rules:
        - alert: LowStockLevel
          expr: |
            inventory_stock_level < 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Low stock for {{ $labels.sku }}"
            description: "SKU {{ $labels.sku }} has only {{ $value }} units in stock."

        - alert: CriticalStockLevel
          expr: |
            inventory_stock_level < 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Critical stock for {{ $labels.sku }}"
            description: "SKU {{ $labels.sku }} has only {{ $value }} units - may cause order failures."

        - alert: HighActiveReservations
          expr: |
            inventory_active_reservations > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Many active reservations"
            description: "{{ $value }} active reservations - may indicate payment processing delays."

        - alert: ReservationExpirySpike
          expr: |
            rate(inventory_reservations_expired_total[5m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High reservation expiry rate"
            description: "Reservations expiring at {{ $value | humanize }} per second - customers may be abandoning carts."

    # ============== Production Alerts ==============
    - name: production
      rules:
        - alert: ProductionBacklog
          expr: |
            production_jobs_by_status{status="pending"} > 20
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Production job backlog"
            description: "{{ $value }} production jobs pending for >15 minutes."

        - alert: SlowProductionJobs
          expr: |
            histogram_quantile(0.95, sum(rate(production_job_duration_seconds_bucket[15m])) by (le))
            > 300
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Slow production jobs"
            description: "P95 production time > 5 minutes. Current: {{ $value | humanizeDuration }}"

    # ============== Infrastructure Alerts ==============
    - name: infrastructure
      rules:
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="postershop"}[5m])) by (pod)
            /
            sum(kube_pod_container_resource_limits{namespace="postershop", resource="cpu"}) by (pod)
            > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} CPU usage > 90% for 10 minutes."

        - alert: HighMemoryUsage
          expr: |
            sum(container_memory_working_set_bytes{namespace="postershop"}) by (pod)
            /
            sum(kube_pod_container_resource_limits{namespace="postershop", resource="memory"}) by (pod)
            > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory on {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} memory usage > 90% for 10 minutes."

        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="postershop"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Pod {{ $labels.pod }} has been restarting continuously for 5 minutes."

