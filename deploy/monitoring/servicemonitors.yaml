# ============================================================
# ServiceMonitors for PosterShop Services
# ============================================================
# These tell Prometheus how to scrape metrics from each service.
# Apply with: kubectl apply -f servicemonitors.yaml -n postershop
# ============================================================
#
# ============================================================
# ServiceMonitor Coverage Status (MON-01) — COMPLETE
# ============================================================
# Monitors defined (9 of 9 backend services):
#   users, catalog, orders, production, logistics, inventory, payments,
#   notifications, infra
#
# Coverage is complete: every backend service that exposes /metrics is scraped.
#
# History: infra's ServiceMonitor was originally deferred to the phase 6 deployment
# to keep phase 4 scope focused. Phase 6 is now complete, so that deferral is
# RESOLVED here rather than overridden — this is the follow-through the original
# note asked for. notifications was added at the same time, having shipped as the
# 9th backend service after this file was first written.
#
# PORT NAMES ARE NOT UNIFORM — see the comment above the infra block below.
# A ServiceMonitor whose `port` does not match a NAMED port on the target Service
# still shows up healthy in `kubectl get servicemonitor` while scraping nothing.
# When adding a service, copy its Service's actual port NAME, do not assume "http".
# ============================================================

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: users
  namespace: postershop
  labels:
    app: users
    release: prometheus
spec:
  selector:
    matchLabels:
      app: users
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - postershop

