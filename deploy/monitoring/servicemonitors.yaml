# ============================================================
# ServiceMonitors for PosterShop Services
# ============================================================
# These tell Prometheus how to scrape metrics from each service.
# Apply with: kubectl apply -f servicemonitors.yaml -n postershop
# ============================================================

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: users
  namespace: postershop
  labels:
    app: users
    release: prometheus
spec:
  selector:
    matchLabels:
      app: users
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - postershop

