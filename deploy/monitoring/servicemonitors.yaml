# ------------------------------------------------------------
# infra — NOTE THE DIFFERENT PORT NAME. This is not a typo.
# ------------------------------------------------------------
# `endpoints[].port` must match a port NAME on the target Service, not a number
# and not the convention used elsewhere in this file.
#
# The other eight services name their Service port "http". infra names its port
# "http-metrics" (deploy/charts/infra/templates/deployment.yaml — the Service's
# ports entry sets both `targetPort: http-metrics` and `name: http-metrics`, and
# the Deployment container declares a matching named port). infra is internally
# consistent; it simply standardized on a different name.
#
# Using `port: http` here would still match the Service via the label selector,
# but would resolve NO port — Prometheus would silently scrape nothing while
# `kubectl get servicemonitor` looked perfectly healthy. This block therefore
# matches existing reality rather than introducing an inconsistency.
#
# Renaming infra's Service port to "http" would be the alternative unification,
# but that is a live-traffic change to a working service and is out of scope here.
#
# The selector is `app: infra` because deploy/charts/infra/Chart.yaml sets
# `name: infra`, so the chart's `app: {{ .Chart.Name }}` label renders to "infra".
# ------------------------------------------------------------
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: infra
  namespace: postershop
  labels:
    app: infra
    release: prometheus
spec:
  selector:
    matchLabels:
      app: infra
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - postershop

