        {
          "type": "stat",
          "title": "Pending Orders",
          "targets": [
            {"expr": "orders_by_status{status=\"created\"}", "legendFormat": "Pending"}
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 50}
                ]
