apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-postershop-orders
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "PosterShop"
data:
  postershop-orders.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "type": "row",
          "title": "Order Overview",
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 1},
          "collapsed": false
        },
        {
          "type": "stat",
          "title": "Orders Created (24h)",
          "targets": [
            {"expr": "sum(increase(orders_created_total[24h]))", "legendFormat": "Orders"}
          ],
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}
