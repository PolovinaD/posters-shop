services:
  postgres:
    image: postgres:16
    container_name: postershop-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootpass}
      POSTGRES_DB: ${POSTGRES_DB:-postershop}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-postershop}"]
      interval: 2s
      timeout: 5s
      retries: 10

  users-migrate:
    build: ./services/users
    container_name: users-migrate
    command: alembic upgrade head
    restart: "no"
    environment:
      DATABASE_URL: postgresql://users_svc:users_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dusers_schema
    depends_on:
      postgres:
        condition: service_healthy

  users:
    build: ./services/users
    container_name: users
    environment:
      DATABASE_URL: postgresql://users_svc:users_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dusers_schema
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      SERVICE_NAME: users
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      users-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8001:8000"

  catalog-migrate:
    build: ./services/catalog
    container_name: catalog-migrate
    command: alembic upgrade head
    restart: "no"
    environment:
      DATABASE_URL: postgresql://catalog_svc:catalog_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dcatalog_schema
    depends_on:
      postgres:
        condition: service_healthy

  catalog:
    build: ./services/catalog
    container_name: catalog
    environment:
      DATABASE_URL: postgresql://catalog_svc:catalog_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dcatalog_schema
      INVENTORY_SERVICE_URL: http://inventory:8000
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      SERVICE_NAME: catalog
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      catalog-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      inventory:
        condition: service_started
    ports:
      - "8002:8000"

  orders-migrate:
    build: ./services/orders
    container_name: orders-migrate
    command: alembic upgrade head
    restart: "no"
    environment:
      DATABASE_URL: postgresql://orders_svc:orders_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dorders_schema
    depends_on:
      postgres:
        condition: service_healthy

  orders:
    build: ./services/orders
    container_name: orders
    environment:
      DATABASE_URL: postgresql://orders_svc:orders_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dorders_schema
      INVENTORY_SERVICE_URL: http://inventory:8000
      PRODUCTION_SERVICE_URL: http://production:8000
      PAYMENT_SERVICE_URL: http://payments:8000
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: whsec_test_secret_key_12345
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      SERVICE_NAME: orders
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      CB_FAILURE_THRESHOLD: ${CB_FAILURE_THRESHOLD:-5}
      CB_RECOVERY_TIMEOUT: ${CB_RECOVERY_TIMEOUT:-30}
    depends_on:
      orders-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      inventory:
        condition: service_started
      payments:
        condition: service_started
    ports:
      - "8003:8000"

  production-migrate:
    build: ./services/production
    container_name: production-migrate
    command: alembic upgrade head
    restart: "no"
    environment:
      DATABASE_URL: postgresql://production_svc:production_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dproduction_schema
    depends_on:
      postgres:
        condition: service_healthy

  production:
    build: ./services/production
    container_name: production
    environment:
      DATABASE_URL: postgresql://production_svc:production_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dproduction_schema
      ORDERS_SERVICE_URL: http://orders:8000
      LOGISTICS_SERVICE_URL: http://logistics:8000
      SERVICE_NAME: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      production-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      logistics:
        condition: service_started
    ports:
      - "8004:8000"

  logistics-migrate:
    build: ./services/logistics
    container_name: logistics-migrate
    command: alembic upgrade head
    restart: "no"
    environment:
      DATABASE_URL: postgresql://logistics_svc:logistics_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dlogistics_schema
    depends_on:
      postgres:
        condition: service_healthy

  logistics:
    build: ./services/logistics
    container_name: logistics
    environment:
      DATABASE_URL: postgresql://logistics_svc:logistics_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dlogistics_schema
      ORDERS_SERVICE_URL: http://orders:8000
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      SERVICE_NAME: logistics
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      logistics-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8005:8000"

  inventory-migrate:
    build: ./services/inventory
    container_name: inventory-migrate
    command: alembic upgrade head
    restart: "no"
    environment:
      DATABASE_URL: postgresql://inventory_svc:inventory_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dinventory_schema
    depends_on:
      postgres:
        condition: service_healthy

  inventory:
    build: ./services/inventory
    container_name: inventory
    environment:
      DATABASE_URL: postgresql://inventory_svc:inventory_pass@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dinventory_schema
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      SERVICE_NAME: inventory
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      inventory-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8006:8000"

  payments:
    build: ./services/payments
    container_name: payments
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: whsec_test_secret_key_12345
      ORDERS_WEBHOOK_URL: http://orders:8000/webhooks/stripe
      SERVICE_NAME: payments
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8007:8000"

  infra:
    build: ./services/infra
    container_name: infra
    environment:
      NAMESPACE: postershop
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      SERVICE_NAME: infra
    ports:
      - "8008:8000"

  # ============================================
  # Frontend - Admin Dashboard
  # ============================================
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - users
      - catalog
      - orders
      - production
      - logistics
      - inventory
      - payments
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
