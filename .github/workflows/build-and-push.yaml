# ============================================================
# Build and Push Docker Images to ECR
# ============================================================
# Triggers on push to main branch when service code changes.
# Uses OIDC for passwordless AWS authentication.
# ============================================================

name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - users
          - catalog
          - orders
          - production
          - logistics
          - inventory
          - payments
          - infra
          - frontend

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'eu-north-1' }}.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ inputs.service }}" == "all" ]; then
              echo 'services=["users","catalog","orders","production","logistics","inventory","payments","infra","frontend"]' >> $GITHUB_OUTPUT
            else
              echo 'services=["${{ inputs.service }}"]' >> $GITHUB_OUTPUT
            fi
          else
            SERVICES=()
            
            # Check each service directory for changes
            for svc in users catalog orders production logistics inventory payments infra; do
              if git diff --name-only HEAD~1 HEAD | grep -q "^services/$svc/"; then
                SERVICES+=("\"$svc\"")
              fi
            done
            
            # Check frontend
            if git diff --name-only HEAD~1 HEAD | grep -q "^frontend/"; then
              SERVICES+=("\"frontend\"")
            fi
            
            if [ ${#SERVICES[@]} -eq 0 ]; then
              echo 'services=[]' >> $GITHUB_OUTPUT
            else
              echo "services=[$(IFS=,; echo "${SERVICES[*]}")]" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'frontend' && './frontend' || format('./services/{0}', matrix.service) }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### ✅ Built and pushed: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: \`${{ env.ECR_REGISTRY }}/${{ matrix.service }}\`" >> $GITHUB_STEP_SUMMARY

