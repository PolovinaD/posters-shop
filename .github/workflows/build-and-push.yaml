# ============================================================
# Build and Push Docker Images to ECR
# ============================================================
# Triggers on push to the master branch when service code changes,
# builds only the services touched by the pushed commit range, pushes
# them to ECR, then calls the reusable deploy workflow with exactly
# that service set at exactly that tag.
#
# Uses OIDC for passwordless AWS authentication.
#
# Known limitation: chart-only changes under deploy/charts/** do not
# trigger this workflow (no image is built at that SHA). Redeploy a
# chart change with a manual "Deploy to EKS" workflow_dispatch,
# naming the image_tag to deploy. See docs/BACKLOG.md.
# ============================================================

name: Build and Push

on:
  push:
    branches: [master]
    paths:
      - 'services/**'
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - catalog
          - frontend
          - infra
          - inventory
          - logistics
          - notifications
          - orders
          - payments
          - production
          - users

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'eu-north-1' }}.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services_json: ${{ steps.changes.outputs.services_json }}
      services_list: ${{ steps.changes.outputs.services_list }}
    steps:
      # fetch-depth: 0 - the push range can be long (the first push of this
      # pipeline is ~161 commits); a shallow clone cannot diff it.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Emits BOTH outputs from one selection:
      #   services_json - JSON array, consumed by the build matrix
      #   services_list - space-separated string, passed to the reusable
      #                   deploy workflow (workflow_call inputs cannot be arrays)
      # The authoritative service set is derived from deploy/charts/ at runtime
      # so the workflows cannot drift from the charts again.
      - name: Detect changed services
        id: changes
        run: |
          ALL=$(ls -1 deploy/charts | tr '\n' ' ')
          SELECTED=()

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED_MODE=dispatch
            REQ="${{ github.event.inputs.service }}"
            if [ "$REQ" = "all" ]; then
              for name in $ALL; do SELECTED+=("$name"); done
            else
              SELECTED+=("$REQ")
            fi
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -z "$BEFORE" ] \
               || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              echo "::notice::No usable base commit (before='$BEFORE') - building ALL services"
              CHANGED_MODE=fallback-all
              for name in $ALL; do SELECTED+=("$name"); done
            else
              echo "::notice::Diffing push range $BEFORE..$AFTER"
              CHANGED_MODE=range
              CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER")
              for name in $ALL; do
                if [ "$name" = "frontend" ]; then
                  PREFIX="frontend/"
                else
                  PREFIX="services/$name/"
                fi
                if printf '%s\n' "$CHANGED_FILES" | grep -q "^${PREFIX}"; then
                  SELECTED+=("$name")
                fi
              done
            fi
          fi

          if [ ${#SELECTED[@]} -eq 0 ]; then
            JSON='[]'
            LIST=''
            # Legitimately empty when a push touches only services/shared/**:
            # shared is a library copied into services, not a deployable chart.
            echo "::notice::No deployable chart matched the changed paths (mode=$CHANGED_MODE) - nothing to build"
          else
            JSON=$(printf '"%s",' "${SELECTED[@]}")
            JSON="[${JSON%,}]"
            LIST="${SELECTED[*]}"
          fi

          echo "services_json=$JSON" >> "$GITHUB_OUTPUT"
          echo "services_list=$LIST" >> "$GITHUB_OUTPUT"

          echo "Detection mode=$CHANGED_MODE services_json=$JSON services_list='$LIST'"

          {
            echo "### Change detection"
            echo ""
            echo "- Mode: \`$CHANGED_MODE\`"
            echo "- Services: \`${LIST:-<none>}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services_json != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      # Idempotent: nothing in CI created repositories before, so the first
      # build of a new service (e.g. notifications) had nowhere to push.
      # AmazonEC2ContainerRegistryPowerUser includes ecr:CreateRepository.
      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ matrix.service }}" \
            --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "${{ matrix.service }}" \
                 --region "$AWS_REGION" --image-scanning-configuration scanOnPush=true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'frontend' && './frontend' || format('./services/{0}', matrix.service) }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Built and pushed: ${{ matrix.service }}"
            echo ""
            echo "- Tag: \`${{ github.sha }}\`"
            echo "- Registry: \`${{ env.ECR_REGISTRY }}/${{ matrix.service }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Deploys exactly the services just built, at exactly the tag just built.
  # `needs: build` means a failed build skips the deploy entirely.
  # services_list (space-separated string) is what crosses the workflow_call
  # boundary - workflow_call inputs cannot be arrays.
  deploy:
    needs: [detect-changes, build]
    if: ${{ needs.detect-changes.outputs.services_json != '[]' && github.event_name == 'push' }}
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy.yaml
    with:
      services: ${{ needs.detect-changes.outputs.services_list }}
      image_tag: ${{ github.sha }}
      namespace: postershop
