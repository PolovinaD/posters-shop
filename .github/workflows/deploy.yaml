# ============================================================
# Deploy to Kubernetes (EKS)
# ============================================================
# Reusable workflow. Invoked by "Build and Push" via workflow_call
# with the exact service set and image tag that were just built,
# or run manually via workflow_dispatch.
#
# Uses OIDC for passwordless AWS authentication.
#
# Cluster-down behaviour: the `probe` step decides whether the EKS
# cluster is reachable. Absent/unreachable -> every deploy step is
# skipped and the run ends GREEN with a note in the step summary.
# Present but `helm upgrade` fails -> the run ends RED.
# ============================================================

name: Deploy to EKS

on:
  workflow_call:
    inputs:
      services:
        description: 'Space-separated list of services to deploy'
        required: true
        type: string
      image_tag:
        description: 'Image tag to deploy (must already exist in ECR)'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace to deploy into'
        required: false
        default: postershop
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      service:
        description: 'Service to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - catalog
          - frontend
          - infra
          - inventory
          - logistics
          - notifications
          - orders
          - payments
          - production
          - users
      image_tag:
        description: 'Image tag to deploy (e.g. latest, or a commit SHA)'
        required: true
        default: 'latest'
        type: string

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  EKS_CLUSTER: ${{ vars.EKS_CLUSTER || 'postershop' }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Normalises the two trigger shapes into one set of step outputs.
      # Under workflow_call the dispatch-only inputs are absent, so the
      # dispatch branch reads `github.event.inputs.*` and the call branch
      # reads `inputs.*` (declared only for workflow_call).
      - name: Resolve deploy inputs
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            if [ "$ENV" = "production" ]; then
              NS=postershop
            else
              NS=postershop-staging
            fi
            SVC="${{ github.event.inputs.service }}"
            if [ "$SVC" = "all" ]; then
              SVCS=$(ls -1 deploy/charts | tr '\n' ' ')
            else
              SVCS="$SVC"
            fi
            TAG="${{ github.event.inputs.image_tag }}"
          else
            NS="${{ inputs.namespace }}"
            SVCS="${{ inputs.services }}"
            TAG="${{ inputs.image_tag }}"
          fi

          # collapse repeated/leading/trailing whitespace
          SVCS=$(printf '%s' "$SVCS" | tr -s '[:space:]' ' ' | sed 's/^ *//; s/ *$//')

          {
            echo "namespace=$NS"
            echo "services=$SVCS"
            echo "image_tag=$TAG"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Deploy plan"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Namespace: \`$NS\`"
            echo "- Services: \`${SVCS:-<none>}\`"
            echo "- Image tag: \`$TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Resolved: namespace=$NS services='$SVCS' image_tag=$TAG"

          if [ -z "$SVCS" ]; then
            echo "::warning::Resolved service list is empty - there is nothing to deploy"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**No services resolved - nothing to deploy.**" >> "$GITHUB_STEP_SUMMARY"
            # Ends this step only; later steps iterate an empty list and no-op.
            exit 0
          fi

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      # The EKS cluster is torn down between test sessions to control cost.
      # A missing cluster is NOT a failure: it produces reachable=false and
      # the deploy steps below are skipped, leaving the run green.
      #
      # THREE outcomes, not two:
      #   REASON  -> benign. The cluster is genuinely absent, genuinely
      #              mid-transition, or genuinely unreachable. reachable=false,
      #              deploy steps skip, run ends GREEN.
      #   FATAL   -> configuration error. IAM denial, invalid credentials, an
      #              unrecognised AWS failure, or an in-cluster RBAC rejection.
      #              These are NOT "the cluster is down" and must never be
      #              reported as such: the step prints ::error::, writes a note
      #              to the job summary, and exits 1, ending the run RED.
      #   neither -> cluster ACTIVE and its API answered. reachable=true.
      # An unrecognised describe-cluster error is FATAL by design. Calling it
      # "cluster-not-found" would assert something we do not know to be true,
      # which is the precise failure mode this classification exists to fix.
      #
      # `set +e` FIRST is mandatory. GitHub Actions runs every `run:` block as
      # `bash -e {0}`, so errexit is already on before the first line, and
      # neither `set -u` nor `set -o pipefail` clears it. Without `set +e` the
      # first failing probe command aborts this step and turns the job RED,
      # which is exactly the behaviour the probe exists to prevent.
      # Belt and braces: every probe command also sits inside an `if`.
      #
      # Stderr from both probe commands is captured to a FILE, never discarded
      # with `2>&1`. The classification greps that file, and every failure
      # branch prints it. `/usr/bin/grep` is pinned so the check cannot be
      # hijacked by a shell function or an alternative grep on PATH.
      - name: Probe EKS cluster
        id: probe
        run: |
          set +e
          set -uo pipefail

          REACHABLE=false
          REASON=""
          FATAL=""

          if ! aws eks describe-cluster --name "$EKS_CLUSTER" --region "$AWS_REGION" \
               --query 'cluster.status' --output text > /tmp/eks_status.txt 2>/tmp/eks_err.txt; then
            echo "::notice::aws eks describe-cluster failed for '$EKS_CLUSTER' in '$AWS_REGION'"
            sed -n '1,20p' /tmp/eks_err.txt
            if /usr/bin/grep -qiE 'ResourceNotFoundException|No cluster found' /tmp/eks_err.txt; then
              REASON="cluster-not-found"
            elif /usr/bin/grep -qiE 'AccessDenied|not authorized to perform' /tmp/eks_err.txt; then
              FATAL="iam-access-denied"
            elif /usr/bin/grep -qiE 'ExpiredToken|InvalidClientTokenId' /tmp/eks_err.txt; then
              FATAL="aws-credentials-invalid"
            else
              FATAL="describe-cluster-failed"
            fi
          fi

          if [ -z "$REASON" ] && [ -z "$FATAL" ]; then
            STATUS=$(tr -d '[:space:]' < /tmp/eks_status.txt)
            if [ "$STATUS" != "ACTIVE" ]; then
              REASON="status-${STATUS:-unknown}"
              echo "::notice::EKS cluster status is '${STATUS:-unknown}', expected ACTIVE"
            fi
          fi

          if [ -z "$REASON" ] && [ -z "$FATAL" ]; then
            if ! aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER" \
                 >/dev/null 2>/tmp/kubeconfig_err.txt; then
              FATAL="update-kubeconfig-failed"
              echo "::notice::aws eks update-kubeconfig failed"
              sed -n '1,20p' /tmp/kubeconfig_err.txt
            fi
          fi

          if [ -z "$REASON" ] && [ -z "$FATAL" ]; then
            if ! kubectl get nodes --request-timeout=20s >/dev/null 2>/tmp/kubectl_err.txt; then
              echo "::notice::kubectl could not list nodes within 20s"
              sed -n '1,20p' /tmp/kubectl_err.txt
              if /usr/bin/grep -qiE 'Forbidden|Unauthorized|must be logged in' /tmp/kubectl_err.txt; then
                FATAL="kubectl-rbac-denied"
              else
                REASON="api-unreachable"
              fi
            fi
          fi

          if [ -n "$FATAL" ]; then
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "reason=$FATAL" >> "$GITHUB_OUTPUT"
            echo "::error::Cluster probe failed with a configuration error: $FATAL"
            {
              echo ""
              echo "### Deploy FAILED - cluster probe hit a configuration error"
              echo ""
              echo "Classification: \`$FATAL\` (cluster \`$EKS_CLUSTER\`, region \`$AWS_REGION\`)"
              echo ""
              echo "This is **not** a torn-down cluster, so the run is red rather than a"
              echo "green skip. Likely causes by classification:"
              echo ""
              echo "- \`iam-access-denied\` - the github-actions-role lacks \`eks:DescribeCluster\`."
              echo "- \`aws-credentials-invalid\` - the OIDC assume-role produced no usable session."
              echo "- \`update-kubeconfig-failed\` - describe succeeded but kubeconfig could not be written."
              echo "- \`kubectl-rbac-denied\` - AWS-side IAM is fine but the role has no in-cluster"
              echo "  RBAC. Add an EKS access entry or an aws-auth ConfigMap mapping."
              echo "- \`describe-cluster-failed\` - an unrecognised AWS error; see the step log."
              echo ""
              echo "The captured error output is printed in the **Probe EKS cluster** step log."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [ -z "$REASON" ]; then
            REACHABLE=true
            REASON="ok"
          fi

          echo "reachable=$REACHABLE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "Cluster probe result: reachable=$REACHABLE reason=$REASON"
          exit 0

      - name: Note skipped deploy (cluster not running)
        if: steps.probe.outputs.reachable != 'true'
        run: |
          {
            echo ""
            echo "### Deploy skipped - EKS cluster is not running"
            echo ""
            echo "Reason: \`${{ steps.probe.outputs.reason }}\` (cluster \`${{ env.EKS_CLUSTER }}\`, region \`${{ env.AWS_REGION }}\`)"
            echo ""
            echo "Images were built and pushed to ECR at tag \`${{ steps.resolve.outputs.image_tag }}\`."
            echo "Nothing was deployed because the cluster is absent or unreachable."
            echo ""
            echo "To deploy these images later, bring the cluster up and run the"
            echo "**Deploy to EKS** workflow manually (Run workflow -> \`image_tag\` ="
            echo "\`${{ steps.resolve.outputs.image_tag }}\`)."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy skipped: cluster not reachable (${{ steps.probe.outputs.reason }}). This is not a failure."

      # No `|| true` on helm and no continue-on-error: a cluster that exists
      # but whose rollout fails MUST fail the run. The `|| true` guards below
      # are on the three diagnostic commands only.
      - name: Deploy services
        if: steps.probe.outputs.reachable == 'true'
        env:
          NS: ${{ steps.resolve.outputs.namespace }}
          SVCS: ${{ steps.resolve.outputs.services }}
          TAG: ${{ steps.resolve.outputs.image_tag }}
        run: |
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          kubectl get namespace "$NS" >/dev/null 2>&1 || kubectl create namespace "$NS"

          FAILED=""
          for svc in $SVCS; do
            echo "::group::helm upgrade $svc"
            if ! helm upgrade --install "$svc" ./deploy/charts/"$svc" \
                 --namespace "$NS" \
                 --set image.repository="${ECR_REGISTRY}/${svc}" \
                 --set image.tag="$TAG" \
                 --wait --timeout 10m; then
              FAILED="$FAILED $svc"
              echo "::error::helm upgrade failed for $svc - diagnostics follow"
              kubectl describe deployment "$svc" -n "$NS" || true
              kubectl get pods -n "$NS" -l app="$svc" -o wide || true
              kubectl logs -n "$NS" -l app="$svc" --tail=100 --all-containers=true || true
            else
              echo "$svc deployed"
            fi
            echo "::endgroup::"
          done

          if [ -n "$FAILED" ]; then
            echo "::error::Failed rollouts:$FAILED"
            {
              echo ""
              echo "### Failed rollouts"
              echo ""
              echo "\`$FAILED\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Get deployment status
        if: steps.probe.outputs.reachable == 'true'
        env:
          NS: ${{ steps.resolve.outputs.namespace }}
        run: |
          {
            echo ""
            echo "### Deployment Status"
            echo ""
            echo "| Service | Ready | Available |"
            echo "|---------|-------|-----------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for deploy in $(kubectl get deployments -n "$NS" -o jsonpath='{.items[*].metadata.name}'); do
            READY=$(kubectl get deployment "$deploy" -n "$NS" -o jsonpath='{.status.readyReplicas}')
            AVAIL=$(kubectl get deployment "$deploy" -n "$NS" -o jsonpath='{.status.availableReplicas}')
            echo "| $deploy | ${READY:-0} | ${AVAIL:-0} |" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Get Ingress URL
        if: steps.probe.outputs.reachable == 'true'
        env:
          NS: ${{ steps.resolve.outputs.namespace }}
        run: |
          URL=$(kubectl get ingress frontend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "Not available yet")
          {
            echo ""
            echo "### Application URL"
            echo ""
            echo "Frontend: http://$URL"
          } >> "$GITHUB_STEP_SUMMARY"
